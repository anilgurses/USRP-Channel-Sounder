# F2F sweep node config: ONE yaml per node, runs both TX and RX roles assigned
# by the coordinator per cycle. The MODE field is informational when launched
# with --coordinator (the coordinator dictates per-cycle role); it's only used
# for manual --start-epoch / --duration runs and as a safety default.
MODE: RX
CONFIG_VERSION: v2
PERIOD: 10
MAX_FREQ_OFF: 15000.0   # dummy
CALIBRATION:
  TYPE: INTERNAL
  RX_REF: 0
  RX_REF_CSV: '../../config/rx_pwr_ref.csv'
  TX_REF: 0
  TX_REF_CSV: ''
WAVEFORM: ZC
RECV_OPTS:
  DURATION: 0.001
  CALC:
    POWER: true
    PL: false
    PLOT: false
  OUTPUT_TYPE: 'npz'
FILTER:
  ENABLED: false
  TYPE: LP
  BW: 2e+6
WAV_OPTS:
  GUARD_LEN_SAMPS: 512    
  CHIRP:
    COMPLEX: true
    PHASE: 0
    COMPRESS: false
    PULSE_RATIO: 10
    DURATION: 1.0
    BW: 5.6e+7
  ZC:
    ROOT_IND: 1           
    SEQ_LEN: 1021         
    NUM_REPEATS: 4
  PN:
    POLY: [1, 0, 0, 0, 0, 1, 1, 0, 1, 1]
    SEQ_LEN: 1023
    COMPLEX_BB: true
  OFDM:
    SUBCARRIERS: 492
    N_PILOTS: 492
    N_FFT: 512
    CP_LEN: 128
    DC_GUARD_BINS: 9
    EDGE_GUARD_BINS: 0
    SEED: 2026
    NORMALIZE_PEAK: true
    TARGET_PEAK: 0.9
USRP:
  SERIAL: ''              
  NUM_FRAMES: 64
  GAIN: 70                # fallback when TX_GAIN / RX_GAIN aren't set
  TX_GAIN: 70             # applied when role=TX for a cycle
  RX_GAIN: 76             # applied when role=RX 
  SAMPLE_RATE: 5.6E+7
  CENTER_FREQ: 3.4e+9
  INIT_DELAY: 0.5
  CLK_REF: EXT            
  PPS_REF: EXT            
  TX_SUBDEV: "A:0"
  TX_CHANNEL_LABEL: "A"
  RX_SUBDEV: "A:0"        # coordinator overrides per cycle (A:0 then B:0)
  RX_CHANNEL_LABEL: "A"
INTERPOLATION:
  ENABLED: false
  SPS: 8
  NUM_TAPS: 101
  ROLLOFF: 0.35
  THR_OFF: 25
GPS:
  ENABLED: false          
  SOURCE: gnss
  DIR: /dev/ttyACM0
EXPERIMENT_TYPE: f2f
TX_NODE: ''               
RX_NODE: ''               
NOTE: "F2F sweep node (56 MHz, ZC-1021x4)"

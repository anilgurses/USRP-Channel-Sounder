MODE: TX
# A2G campaign: high-resolution variant. 100 MHz BW -> 3.0 m range res.
# Requires X310-class USRP @ 100 MS/s. Unambig delay = (SEQ_LEN+GUARD)/Fs.
# Path-delay @500m = 1.67 us; (401+200)/100e6 = 6.0 us -> 1.8 km unambig.
PERIOD: 200
CALIBRATION:
  TYPE: INTERNAL
  RX_REF: 0
  RX_REF_CSV: '../../config/rx_pwr_ref.csv'
  TX_REF: 0
  TX_REF_CSV: ''
WAVEFORM: ZC
RECV_OPTS:
  DURATION: 0.001
  CALC:
    POWER: true
    PL: false
    PLOT: false
  OUTPUT_TYPE: 'npz'
FILTER:
  ENABLED: false
  TYPE: LP
  BW: 2e+6
WAV_OPTS:
  GUARD_LEN_SAMPS: 200 # 2 us @ 100 MHz -> covers ~600 m of excess delay
  CHIRP:
    COMPLEX: true
    PHASE: 0
    COMPRESS: false
    PULSE_RATIO: 10
    DURATION: 1.0
    BW: 1.0e+8
  ZC:
    ROOT_IND: 1
    SEQ_LEN: 401
    NUM_REPEATS: 8
  PN:
    POLY: [1,0,0,0,0,1,1,0,1,1]
    SEQ_LEN: 1023
    COMPLEX_BB: true
  OFDM:
    SUBCARRIERS: 492
    N_PILOTS: 492
    N_FFT: 512
    CP_LEN: 128
    DC_GUARD_BINS: 9
    EDGE_GUARD_BINS: 0
    SEED: 2026
    NORMALIZE_PEAK: true
    TARGET_PEAK: 0.9
USRP:
  SERIAL: ''
  NUM_FRAMES: 32
  GAIN: 64
  SAMPLE_RATE: 1.0E+8
  CENTER_FREQ: 3.4e+9
  INIT_DELAY: 2.0
  CLK_REF: EXT
  PPS_REF: EXT
INTERPOLATION:
  ENABLED: false
  SPS: 8
  NUM_TAPS: 101
  ROLLOFF: 0.35
  THR_OFF: 25
GPS:
  ENABLED: true
  SOURCE: gnss
  DIR: /dev/ttyACM1
NOTE: "A2G 500m high-res (100 MHz, ZC-401x8) - TX"

MODE: TX
PERIOD: 100
CALIBRATION:
  TYPE: INTERNAL
  RX_REF: 0
  RX_REF_CSV: '../../config/rx_pwr_ref.csv'
  TX_REF: 0
  TX_REF_CSV: ''
WAVEFORM: ZC
RECV_OPTS:
  DURATION: 0.001
  CALC:
    POWER: true
    PL: false
    PLOT: false
  OUTPUT_TYPE: 'npz'
FILTER:
  ENABLED: false
  TYPE: LP
  BW: 2e+6
WAV_OPTS:
  GUARD_LEN_SAMPS: 128 # > expected max excess delay (~0.5 us @ 56 MHz = 28 samps); 128 leaves 5x margin
  CHIRP:
    COMPLEX: true
    PHASE: 0
    COMPRESS: false
    PULSE_RATIO: 10
    DURATION: 1.0
    BW: 5.6e+7
  ZC:
    ROOT_IND: 1      # best aperiodic-autocorr PSLR for SEQ_LEN=401 (~32 dB; verified by sweep)
    SEQ_LEN: 401     # prime; 26.0 dB processing gain; good autocorr
    NUM_REPEATS: 8   # +9 dB coherent averaging gain at low SNR
  PN:
    POLY: [1,0,0,0,0,1,1,0,1,1]
    SEQ_LEN: 1023
    COMPLEX_BB: true
  OFDM:
    SUBCARRIERS: 492
    N_PILOTS: 492
    N_FFT: 512
    CP_LEN: 128
    DC_GUARD_BINS: 9
    EDGE_GUARD_BINS: 0
    SEED: 2026
    NORMALIZE_PEAK: true
    TARGET_PEAK: 0.9
USRP:
  SERIAL: ''
  NUM_FRAMES: 32
  GAIN: 64
  SAMPLE_RATE: 5.6E+7
  CENTER_FREQ: 3.4e+9
  INIT_DELAY: 2.0
  CLK_REF: EXT
  PPS_REF: EXT
INTERPOLATION:
  ENABLED: false
  SPS: 8
  NUM_TAPS: 101
  ROLLOFF: 0.35
  THR_OFF: 25
GPS:
  ENABLED: true
  SOURCE: gnss
  DIR: /dev/ttyACM1
NOTE: "A2G 500m baseline (56 MHz, ZC-401x8) - TX"
